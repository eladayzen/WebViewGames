<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Car Racer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="stage">
      <div id="app">
        <div id="hud">
          <div class="hudLeft">
            <div id="lives"></div>
            <div id="score">0m</div>
          </div>
          <div id="coins">0</div>
        </div>
        <button id="modeToggle">MODE: RUNNER (tap)</button>
        <div id="touchControls">
          <button id="btnLeft" class="dpad">&#9664;</button>
          <button id="btnRight" class="dpad">&#9654;</button>
        </div>
        <div id="gameover" class="overlay hidden">
          <div class="title">CRASHED</div>
          <div id="finalScore"></div>
          <button id="restartBtn">RESTART</button>
        </div>
        <div id="howto">TAP LEFT/RIGHT OR ARROW KEYS / A D TO CHANGE LANES</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
